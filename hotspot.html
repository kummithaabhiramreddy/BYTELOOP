<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotspot - ByteLoop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .page-container {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: 100%;
            overflow-y: auto;
        }
        .header-top {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .header-top h1 {
            font-size: 1.5rem;
            margin: 0;
            margin-left: 1rem;
        }
        .icon-btn-back {
            background-color: var(--bg-base);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: var(--shadow-light);
            cursor: pointer;
            color: var(--primary);
        }
        .icon-btn-back:active {
            box-shadow: var(--shadow-inset);
        }
        
        .neumorph-card {
            background-color: var(--bg-base);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: var(--shadow-light);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .toggle-row h3 {
            font-size: 1.1rem;
            color: var(--text-main);
        }

        /* Toggle switch */
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 28px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(163,177,198,0.5);
            transition: .4s;
            border-radius: 34px;
            box-shadow: var(--shadow-inset);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
            box-shadow: var(--shadow-light);
        }
        input:checked + .slider {
            background-color: var(--primary);
        }
        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .input-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        .neumorph-input {
            background-color: var(--bg-base);
            border: none;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: var(--shadow-inset);
            font-family: 'Outfit';
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
        }
        .neumorph-btn {
            background-color: var(--bg-base);
            border: none;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: var(--shadow-light);
            font-family: 'Outfit';
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
        }
        .neumorph-btn:active {
            box-shadow: var(--shadow-inset);
        }

        /* QR Section */
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
            display: none;
        }
        .qr-section.active {
            display: flex;
            animation: fadeIn 0.4s ease;
        }
        #qrcode {
            padding: 1rem;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow-light);
        }
        .qr-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* Devices List */
        .device-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .device-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background-color: var(--bg-base);
            border-radius: 16px;
            box-shadow: var(--shadow-light);
        }
        .device-icon {
            width: 40px; height: 40px;
            border-radius: 50%;
            background-color: var(--bg-base);
            box-shadow: var(--shadow-inset);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary);
            font-size: 20px;
        }
        .device-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .device-name { font-weight: 600; font-size: 1rem; }
        .device-ip { font-size: 0.8rem; color: var(--text-muted); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div class="page-container">
            <div class="header-top">
                <a href="index.html" class="icon-btn-back"><i class="ph ph-caret-left"></i></a>
                <h1>Personal Hotspot</h1>
            </div>

            <div class="neumorph-card">
                <div class="toggle-row">
                    <h3>Share my connection</h3>
                    <label class="toggle-switch">
                        <input type="checkbox" id="hotspotToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="input-group">
                    <label>Network Name (SSID)</label>
                    <input type="text" class="neumorph-input" id="hotspotName" placeholder="ByteLoop">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="text" class="neumorph-input" id="hotspotPassword" placeholder="ByteLoop123">
                </div>

                <button class="neumorph-btn" id="saveBtn">Apply Changes</button>
            </div>

            <!-- QR Code display -->
            <div class="neumorph-card qr-section" id="qrSection">
                <h3 style="text-align: center; color: var(--text-main);">Scan to Join</h3>
                <div id="qrcode"></div>
                <p class="qr-label">Use your camera or the ByteLoop Wi-Fi Scanner to join automatically.</p>
            </div>

            <!-- Advanced Settings -->
            <div class="neumorph-card">
                <h3 style="margin-bottom: 0.5rem;">Advanced Settings</h3>
                
                <div class="toggle-row">
                    <span style="font-size: 0.95rem; font-weight: 600; color: var(--text-main);">Automatically turn off<br><span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 400;">When no devices are connected</span></span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="advAutoOff" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="toggle-row">
                    <span style="font-size: 0.95rem; font-weight: 600; color: var(--text-main);">Hide Hotspot</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="advHide">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="toggle-row" style="border-bottom: none; padding-bottom: 0;">
                    <span style="font-size: 0.95rem; font-weight: 600; color: var(--text-main);">Use Wi-Fi 6</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="advWifi6">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="neumorph-card">
                <h3>Connected Devices (<span id="deviceCount">0</span>)</h3>
                <div class="device-list" id="deviceList">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">No devices connected</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') && window.location.port !== '3000' ? 'http://localhost:3000' : '';
        const toggle = document.getElementById('hotspotToggle');
        const saveBtn = document.getElementById('saveBtn');
        const nameInput = document.getElementById('hotspotName');
        const passwordInput = document.getElementById('hotspotPassword');
        const qrSection = document.getElementById('qrSection');
        const qrcodeContainer = document.getElementById('qrcode');

        if (localStorage.getItem('hotspotName')) {
            nameInput.value = localStorage.getItem('hotspotName');
        } else {
            nameInput.value = 'ByteLoop';
        }
        if (localStorage.getItem('hotspotPassword')) {
            passwordInput.value = localStorage.getItem('hotspotPassword');
        } else {
            passwordInput.value = 'ByteLoop123';
        }

        let qrCodeInstance = null;
        let lastRenderedName = null;
        let currentQRString = null;
        let isTransitioning = false;
        let transitionTimeout = null;

        const advAutoOff = document.getElementById('advAutoOff');
        const advHide = document.getElementById('advHide');
        const advWifi6 = document.getElementById('advWifi6');

        function setupAdvancedToggle(el, key, defaultVal) {
            if (localStorage.getItem(key) !== null) {
                el.checked = localStorage.getItem(key) === 'true';
            } else {
                el.checked = defaultVal;
                localStorage.setItem(key, defaultVal);
            }
            el.addEventListener('change', () => {
                localStorage.setItem(key, el.checked);
            });
        }

        setupAdvancedToggle(advAutoOff, 'hotspotAutoOff', true);
        setupAdvancedToggle(advHide, 'hotspotHide', false);
        setupAdvancedToggle(advWifi6, 'hotspotWifi6', false);

        function startTransition() {
            isTransitioning = true;
            if (transitionTimeout) clearTimeout(transitionTimeout);
            transitionTimeout = setTimeout(() => {
                isTransitioning = false;
            }, 12000); // 12 seconds grace period for hotspot state change
        }

        function fetchStatus() {
            const userId = localStorage.getItem('userId') || '';
            fetch(`${API_BASE}/api/hotspot/status${userId ? '?userId=' + userId : ''}`)
                .then(r => r.json())
                .then(data => {
                    if (!isTransitioning) {
                        toggle.checked = data.active;
                        if (data.active) {
                            localStorage.setItem('hotspotToggleState', 'true');
                            showQRCode();
                        } else {
                            localStorage.setItem('hotspotToggleState', 'false');
                            hideQRCode();
                        }
                    }

                    renderClients(data.clients || []);
                })
                .catch(err => console.error("Error fetching hotspot status:", err));
        }

        // Initialize toggle from localStorage
        if (localStorage.getItem('hotspotToggleState') === 'true') {
            toggle.checked = true;
            showQRCode();
        }

        function showQRCode() {
            const ssid = nameInput.value;
            const pw = passwordInput.value;
            const wifiString = `WIFI:T:WPA;S:${ssid};P:${pw};;`;
            
            qrSection.classList.add('active');
            
            if (currentQRString === wifiString) return; // Prevent recreation flickering
            currentQRString = wifiString;
            
            qrcodeContainer.innerHTML = '';
            if (typeof QRCode !== 'undefined') {
                qrCodeInstance = new QRCode(qrcodeContainer, {
                    text: wifiString,
                    width: 140,
                    height: 140,
                    colorDark : "#2d3748",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.L
                });
            } else {
                qrcodeContainer.innerHTML = `<div style="padding: 1rem; border: 2px dashed var(--text-muted); font-size: 0.85rem; word-break: break-all; color: var(--text-main); font-weight: 600;">${wifiString}</div>`;
            }
        }

        function hideQRCode() {
            qrSection.classList.remove('active');
            qrcodeContainer.innerHTML = '';
            currentQRString = null;
        }

        function renderClients(clients) {
            const list = document.getElementById('deviceList');
            document.getElementById('deviceCount').textContent = clients.length;
            if (clients.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem;">No devices connected</p>';
                return;
            }
            list.innerHTML = '';
            clients.forEach(c => {
                const el = document.createElement('div');
                el.className = 'device-item';
                el.innerHTML = `
                    <div class="device-icon"><i class="ph ph-device-mobile"></i></div>
                    <div class="device-info">
                        <span class="device-name">${c.name || 'Unknown Device'}</span>
                        <span class="device-ip">${c.ip || ''}</span>
                    </div>
                `;
                list.appendChild(el);
            });
        }

        toggle.addEventListener('change', () => {
            startTransition();
            if (toggle.checked) {
                localStorage.setItem('hotspotToggleState', 'true');
                showQRCode();
                // Start hotspot asynchronously in background
                fetch(`${API_BASE}/api/hotspot/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: nameInput.value, password: passwordInput.value, userId: localStorage.getItem('userId') })
                })
                .then(r => r.json())
                .then(data => {
                    isTransitioning = false;
                    if (!data.success) {
                        alert(data.error || 'Failed to start hotspot');
                        toggle.checked = false;
                        localStorage.setItem('hotspotToggleState', 'false');
                        hideQRCode();
                    }
                })
                .catch(err => {
                    isTransitioning = false;
                    console.error("Failed to start hotspot:", err);
                    toggle.checked = false;
                    localStorage.setItem('hotspotToggleState', 'false');
                    hideQRCode();
                });
            } else {
                localStorage.setItem('hotspotToggleState', 'false');
                hideQRCode();
                // Stop hotspot asynchronously in background
                fetch(`${API_BASE}/api/hotspot/stop`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: localStorage.getItem('userId') })
                })
                .then(r => r.json())
                .then(data => {
                    isTransitioning = false;
                    if (data.success) {
                        renderClients([]);
                    }
                })
                .catch(err => {
                    isTransitioning = false;
                    console.error("Failed to stop hotspot:", err);
                });
            }
        });

        saveBtn.addEventListener('click', () => {
            // Save the new values to localStorage immediately
            localStorage.setItem('hotspotName', nameInput.value);
            localStorage.setItem('hotspotPassword', passwordInput.value);
            
            // Force QR code to regenerate with new values
            currentQRString = null;
            
            if (toggle.checked) {
                // If hotspot is currently ON, we apply the changes by starting/restarting it in the background
                showQRCode(); // Update QR code immediately
                startTransition();
                
                const originalText = saveBtn.textContent;
                saveBtn.textContent = "Applying...";
                saveBtn.disabled = true;
                
                fetch(`${API_BASE}/api/hotspot/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: nameInput.value, password: passwordInput.value, userId: localStorage.getItem('userId') })
                })
                .then(r => r.json())
                .then(data => {
                    saveBtn.textContent = originalText;
                    saveBtn.disabled = false;
                    if (!data.success) {
                        alert(data.error || 'Failed to apply hotspot changes');
                    }
                })
                .catch(err => {
                    saveBtn.textContent = originalText;
                    saveBtn.disabled = false;
                    console.error("Failed to apply hotspot changes:", err);
                });
            } else {
                // Hotspot is OFF, just save to localStorage and show visual feedback on the button
                const originalText = saveBtn.textContent;
                saveBtn.textContent = "Saved!";
                saveBtn.disabled = true;
                setTimeout(() => {
                    saveBtn.textContent = originalText;
                    saveBtn.disabled = false;
                }, 2000);
            }
        });

        setInterval(fetchStatus, 5000);
        fetchStatus();
    </script>
</body>
</html>
